<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ápice — Aparência</title>
  <link rel="stylesheet" href="../css/global.css">
  <script src="../js/theme.js"></script>
  <style>
    .font-btn {
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      border-radius: var(--radius-xs);
      padding: 6px 12px;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
    }

    .font-btn:hover {
      border-color: var(--accent);
    }

    .font-btn:active {
      transform: scale(0.96);
    }

    .font-btn.active {
      background: var(--accent-dim);
      border-color: rgba(200, 240, 96, 0.3);
      color: var(--accent);
    }
  </style>
</head>

<body>
  <nav class="nav">
    <a href="home.html" class="nav-logo">Áp<em>i</em>ce</a>
    <div class="nav-right">
      <button class="nav-icon-btn" type="button" aria-label="Alternar tema" title="Alternar tema" data-theme-toggle>
        <span class="icon-moon"><svg viewBox="0 0 24 24">
            <path d="M21 12.8A8.5 8.5 0 1111.2 3a6.5 6.5 0 009.8 9.8z" />
          </svg></span>
        <span class="icon-sun"><svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
          </svg></span>
      </button>
      <a href="perfil.html" class="nav-avatar">MA</a>
    </div>
  </nav>
  <main class="main">
    <a href="perfil.html" class="back-link">
      <svg viewBox="0 0 24 24">
        <polyline points="15 18 9 12 15 6" />
      </svg>
      Voltar ao perfil
    </a>
    <div class="page-header anim anim-d1">
      <div class="page-title">Aparência</div>
      <div class="page-sub">Personalize como o Ápice aparece para você.</div>
    </div>

    <div class="card anim anim-d2">
      <div class="card-title">Tema</div>
      <div style="font-size: 13px; color: var(--text2); line-height: 1.6;">
        O tema (claro/escuro) agora pode ser alternado direto no <strong
          style="color:var(--text);font-weight:500;">header</strong> pelo botão de sol/lua.
      </div>
    </div>

    <div class="card anim anim-d2">
      <div class="card-title">Texto</div>
      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-label">Tamanho da fonte</div>
          <div class="toggle-sub">Padrão</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="font-btn">A-</button>
          <button class="font-btn active">A</button>
          <button class="font-btn">A+</button>
        </div>
      </div>
    </div>
  </main>
  <nav class="bottom-tab">
    <a href="home.html" class="tab-item">
      <div class="tab-icon"><svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg></div>
      <div class="tab-label">Início</div>
    </a>
    <a href="corretor.html" class="tab-item">
      <div class="tab-icon"><svg viewBox="0 0 24 24">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg></div>
      <div class="tab-label">Corretor</div>
    </a>
    <a href="radar.html" class="tab-item">
      <div class="tab-icon"><svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="2" />
          <path
            d="M16.24 7.76a6 6 0 010 8.49m-8.48-.01a6 6 0 010-8.49m11.31-2.82a10 10 0 010 14.14m-14.14 0a10 10 0 010-14.14" />
        </svg></div>
      <div class="tab-label">Radar</div>
    </a>
    <a href="perfil.html" class="tab-item active">
      <div class="tab-icon"><svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg></div>
      <div class="tab-label">Perfil</div>
    </a>
  </nav>
</body>

</html>
