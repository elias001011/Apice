<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ápice — Criar conta</title>
  <link rel="stylesheet" href="../css/global.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200, 240, 96, 0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
    }

    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logo-mark {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .logo-mark svg {
      width: 23px;
      height: 23px;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--text);
      letter-spacing: -0.4px;
      margin-bottom: 5px;
      text-align: center;
    }

    .page-sub {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
    }

    .card-form {
      background: var(--bg2);
      border: 1.5px solid var(--border2);
      border-radius: 24px;
      padding: 2rem;
    }

    .input-group {
      margin-bottom: 13px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 13px;
    }

    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 1rem 0;
    }

    .terms input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 1px;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }

    .terms label {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
      cursor: pointer;
    }

    .terms label a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-login {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 12px;
      color: var(--text3);
    }

    .footer-login a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top anim anim-d1">
      <a href="../login.html" class="logo-mark" style="text-decoration:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0f0f0f" stroke-width="2.2" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="3 17 9 11 13 15 21 7" />
          <polyline points="14 7 21 7 21 14" />
        </svg>
      </a>
      <div class="page-title">Criar conta gratuita</div>
      <div class="page-sub">Comece a estudar para o ENEM hoje</div>
    </div>

    <div class="card-form anim anim-d2">
      <div class="input-row">
        <div>
          <label class="input-label">Nome</label>
          <input type="text" class="input-field" placeholder="Maria">
        </div>
        <div>
          <label class="input-label">Sobrenome</label>
          <input type="text" class="input-field" placeholder="Alves">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">E-mail</label>
        <input type="email" class="input-field" placeholder="seu@email.com">
      </div>

      <div class="input-group">
        <label class="input-label">Escola</label>
        <input type="text" class="input-field" placeholder="Nome da sua escola (opcional)">
      </div>

      <div class="input-group">
        <label class="input-label">Senha</label>
        <input type="password" class="input-field" placeholder="Mínimo 8 caracteres">
      </div>

      <div class="input-group">
        <label class="input-label">Confirmar senha</label>
        <input type="password" class="input-field" placeholder="Repita a senha">
      </div>

      <div class="terms">
        <input type="checkbox" id="termos">
        <label for="termos">Concordo com os <a href="termos.html">Termos de uso</a> e a <a
            href="privacidade.html">Política de privacidade</a></label>
      </div>

      <a href="home.html" class="btn-primary">Criar minha conta</a>
    </div>

    <div class="footer-login anim anim-d3">
      Já tem conta? <a href="../login.html">Entrar</a>
    </div>
  </div>
</body>

</html>
