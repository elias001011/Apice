<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ápice — Recuperar senha</title>
  <link rel="stylesheet" href="../css/global.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
    }

    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .icon-wrap {
      width: 56px;
      height: 56px;
      background: var(--bg2);
      border: 1.5px solid var(--border2);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .icon-wrap svg {
      width: 22px;
      height: 22px;
      stroke: var(--text2);
      fill: none;
      stroke-width: 1.5;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      line-height: 1.5;
    }

    .card-form {
      background: var(--bg2);
      border: 1.5px solid var(--border2);
      border-radius: 24px;
      padding: 2rem;
    }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 12px;
      color: var(--text3);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top anim anim-d1">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" />
          <path d="M7 11V7a5 5 0 0110 0v4" />
        </svg>
      </div>
      <div class="page-title">Recuperar senha</div>
      <div class="page-sub">Informe seu e-mail e enviaremos um link para redefinir sua senha.</div>
    </div>

    <div class="card-form anim anim-d2">
      <div style="margin-bottom: 14px;">
        <label class="input-label">E-mail cadastrado</label>
        <input type="email" class="input-field" placeholder="seu@email.com">
      </div>
      <a href="../login.html" class="btn-primary">Enviar link de recuperação</a>
    </div>

    <div class="footer anim anim-d3">
      Lembrou a senha? <a href="../login.html">Voltar ao login</a>
    </div>
  </div>
</body>

</html>
